<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>نظام المحل</title>
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js">
  </script>
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      text-align: center;
      padding: 10px;
      direction: rtl;
      background: #f5f7fa;
    }
    .card {
      background: #ffffff;
      padding: 20px;
      border-radius: 20px;
      max-width: 500px;
      margin: auto;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
    }
    h2 {
      color: #2c3e50;
      margin-top: 5px;
    }
    #infoProduit {
      background: #e8f0fe;
      padding: 15px;
      border-radius: 12px;
      margin: 15px 0;
      text-align: right;
      border-right: 5px solid #1a73e8;
    }
    #infoProduit strong {
      color: #1a73e8;
    }
    input,
    button {
      width: 100%;
      padding: 14px;
      margin: 6px 0;
      border: 1px solid #dce1e8;
      border-radius: 12px;
      font-size: 16px;
    }
    button {
      background: #1a73e8;
      color: white;
      font-weight: bold;
      border: none;
      cursor: pointer;
      transition: 0.2s;
    }
    button:active {
      transform: scale(0.97);
    }
    .btn-reception {
      background: #e67e22;
    }
    .btn-danger {
      background: #e74c3c;
    }
    .btn-info {
      background: #2ecc71;
    }
    .btn-purple {
      background: #8e44ad;
    }
    .btn-gray {
      background: #7f8c8d;
    }
    #result {
      margin-top: 15px;
      padding: 12px;
      border-radius: 12px;
      background: #f8f9fa;
      border: 1px solid #e9ecef;
    }
    .success {
      color: #27ae60;
      font-weight: bold;
    }
    .error {
      color: #e74c3c;
      font-weight: bold;
    }
    .flex-row {
      display: flex;
      gap: 10px;
    }
    .flex-row button {
      width: 50%;
    }
    #inventory {
      text-align: right;
      background: #f1f3f5;
      padding: 12px;
      border-radius: 12px;
      margin-top: 15px;
      font-size: 13px;
      white-space: pre-wrap;
      max-height: 200px;
      overflow-y: auto;
    }
    #reader {
      width: 100%;
      max-width: 400px;
      margin: 10px auto;
    }
    hr {
      border: none;
      border-top: 2px dashed #e9ecef;
      margin: 18px 0;
    }
  </style>
</head>
<body>
  <div class="card">
    <h2>🏪 نظام البيع والاستلام</h2>

    <div id="reader"></div>

    <div id="infoProduit">
      <strong>المنتج :</strong> <span id="nomProduit">⬅️ انتظر المسح أو البحث</span><br>
      <strong>سعر البيع :</strong> <span id="prixVente">0</span> DH<br>
      <strong>سعر الشراء :</strong> <span id="prixAchat">0</span> DH
    </div>

    <label>الكمية :</label>
    <input type="number" id="quantity" value="1" min="1" style="text-align:center;">

    <div class="flex-row">
      <button onclick="vendre()" style="background:#27ae60;">💳 بيع</button>
      <button onclick="recevoir()" class="btn-reception">📥 استلام</button>
    </div>

    <hr>

    <button onclick="demarrerScanner()" class="btn-purple">📷 مسح بالكاميرا</button>
    <button onclick="arreterScanner()" class="btn-danger">⏹ إيقاف الكاميرا</button>

    <div style="display:flex; gap:5px; margin-top:5px;">
      <input type="text" id="manualBarcode" placeholder="✏️ أدخل الباركود يدوياً" style="width:70%;">
      <button onclick="chercherManuel()" class="btn-gray" style="width:30%; padding:14px 5px;">🔍 بحث</button>
    </div>

    <div id="result">📱 اضغط على "مسح بالكاميرا" لبدء المسح</div>

    <hr>

    <button onclick="afficherStock()" class="btn-info">📋 عرض المخزون الحالي</button>
    <pre id="inventory">📦 اضغط لعرض المخزون...</pre>
  </div>

  <script>
    // ⚠️ رابط تطبيق الويب الخاص بك (تأكد من صحته)
    const APP_URL = 'https://script.google.com/macros/s/AKfycbxGbhFyNfKMiB6LcDR1Jbddhm7bPi6p1sz9YvJTJSA8eZnmXoRRDj25UhCG-LQzyZbuoA/exec';

    var codeBarreActuel = null;
    var html5QrCode = null;

    // ================== دالة الاتصال بالخادم (بدون no-cors) ==================
    async function callServer(action, data = {}) {
      try {
        const response = await fetch(APP_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({ action: action, ...data })
        });

        // التحقق من نجاح الاتصال
        if (!response.ok) {
          throw new Error('فشل الاتصال بالخادم (HTTP ' + response.status + ')');
        }

        const text = await response.text();
        // محاولة تحويل النص إلى JSON
        try {
          return JSON.parse(text);
        } catch (e) {
          // إذا لم يكن JSON، نعرض النص الخام
          return { succes: false, msg: 'الخادم أعاد نصاً غير مفهوم: ' + text.substring(0, 100) };
        }
      } catch (error) {
        console.error('خطأ في fetch:', error);
        return { succes: false, msg: '⚠️ مشكلة في الشبكة أو الخادم: ' + error.message };
      }
    }

    // ================== دوال البحث والمسح ==================
    function onScanSuccess(decodedText) {
      codeBarreActuel = decodedText;
      document.getElementById('nomProduit').innerText = '⏳ جاري البحث...';
      document.getElementById('result').innerHTML = '⏳ جاري البحث عن المنتج...';

      callServer('searchProduct', { code: decodedText })
        .then(produit => {
          if (produit && produit.trouve) {
            document.getElementById('nomProduit').innerText = produit.nom;
            document.getElementById('prixVente').innerText = produit.prixVente;
            document.getElementById('prixAchat').innerText = produit.prixAchat;
            document.getElementById('result').innerHTML = '<span class="success">✅ تم العثور على المنتج</span>';
          } else {
            document.getElementById('nomProduit').innerText = '❌ غير موجود!';
            document.getElementById('prixVente').innerText = '0';
            document.getElementById('prixAchat').innerText = '0';
            document.getElementById('result').innerHTML = '<span class="error">❌ ' + (produit?.msg || 'الباركود غير مسجل') + '</span>';
          }
        })
        .catch(err => {
          document.getElementById('result').innerHTML = '<span class="error">⚠️ خطأ: ' + err.message + '</span>';
        });
    }

    function demarrerScanner() {
      if (html5QrCode) {
        html5QrCode.stop().then(() => { html5QrCode.clear();
          demarrerEffectivement(); });
      } else {
        demarrerEffectivement();
      }
    }

    function demarrerEffectivement() {
      html5QrCode = new Html5Qrcode("reader");
      var config = { fps: 15, qrbox: { width: 220, height: 150 }, aspectRatio: 1.5 };
      html5QrCode.start({ facingMode: "environment" }, config, onScanSuccess)
        .catch(err => {
          document.getElementById('result').innerHTML = '<span class="error">⚠️ تعذر الوصول للكاميرا: ' + err + '</span>';
        });
    }

    function arreterScanner() {
      if (html5QrCode) {
        html5QrCode.stop().then(() => html5QrCode.clear()).catch(() => {});
      }
      document.getElementById('result').innerHTML = '⏹ تم إيقاف الكاميرا';
    }

    function chercherManuel() {
      var code = document.getElementById('manualBarcode').value.trim();
      if (code.length < 3) {
        document.getElementById('result').innerHTML = '<span class="error">⚠️ الرجاء كتابة باركود صحيح (3 أرقام على الأقل)</span>';
        return;
      }
      codeBarreActuel = code;
      onScanSuccess(code);
      document.getElementById('manualBarcode').value = '';
    }

    // ================== دوال البيع والاستلام ==================
    async function vendre() {
      if (!codeBarreActuel) { alert('يرجى مسح الباركود أو البحث عنه أولاً!'); return; }
      var qty = parseInt(document.getElementById('quantity').value);
      if (qty < 1) { alert('الكمية غير صحيحة'); return; }

      document.getElementById('result').innerHTML = '⏳ جاري تنفيذ البيع...';

      const response = await callServer('sell', { code: codeBarreActuel, qty: qty });

      if (response && response.succes) {
        document.getElementById('result').innerHTML = '<span class="success">' + response.msg + ' - الفاتورة: #' + response
          .facture + ' - المجموع: ' + response.total + ' DH</span>';
        document.getElementById('quantity').value = 1;
        afficherStock();
        document.getElementById('nomProduit').innerText = 'تم البيع ✔️';
      } else {
        document.getElementById('result').innerHTML = '<span class="error">❌ ' + (response?.msg || 'حدث خطأ غير معروف') + '</span>';
      }
    }

    async function recevoir() {
      if (!codeBarreActuel) { alert('يرجى مسح الباركود أو البحث عنه أولاً!'); return; }
      var qty = parseInt(document.getElementById('quantity').value);
      if (qty < 1) { alert('الكمية غير صحيحة'); return; }

      var fournisseur = prompt('📝 أدخل اسم المورد (اختياري):', 'مورد عام');

      document.getElementById('result').innerHTML = '⏳ جاري تسجيل الاستلام...';

      const response = await callServer('receive', { code: codeBarreActuel, qty: qty, fournisseur: fournisseur });

      if (response && response.succes) {
        document.getElementById('result').innerHTML = '<span class="success">' + response.msg + ' - رقم الأمر: #' + response
          .reception + ' - الكمية الجديدة: ' + response.nouvelleQte + '</span>';
        document.getElementById('quantity').value = 1;
        afficherStock();
      } else {
        document.getElementById('result').innerHTML = '<span class="error">❌ ' + (response?.msg || 'حدث خطأ غير معروف') + '</span>';
      }
    }

    // ================== عرض المخزون (المعدل لإظهار الأخطاء) ==================
    async function afficherStock() {
      const inventoryDiv = document.getElementById('inventory');
      inventoryDiv.textContent = '⏳ جاري التحميل...';
      
      const data = await callServer('getProducts');

      if (!data || data.length === 0) {
        // التحقق مما إذا كان الرد يحمل رسالة خطأ
        if (data && data.msg) {
          inventoryDiv.textContent = '❌ ' + data.msg;
        } else {
          inventoryDiv.textContent = '📭 لا توجد منتجات مسجلة.';
        }
        return;
      }

      // إذا كانت البيانات مصفوفة (كما هو متوقع)
      var text = '📦 قائمة المنتجات:\n' + '─'.repeat(20) + '\n';
      data.forEach(function(row) {
        text += `🔹 ${row[1]} (${row[0]})\n` +
          `   سعر البيع: ${row[3]} | الكمية: ${row[5]} | قيمة المخزون: ${row[6]}\n`;
      });
      inventoryDiv.textContent = text;
    }

    // ================== عند تحميل الصفحة ==================
    window.onload = function() {
      afficherStock();
      document.getElementById('result').innerHTML = '📱 استخدم "مسح بالكاميرا" أو "البحث اليدوي"';
    };
  </script>
</body>
</html>
