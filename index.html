<!doctype html>
<html lang="fr">
<head>

<meta charset="utf-8">

<meta
  name="viewport"
  content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"
>

<title>Application Vente</title>

<style>

:root {
  --p: #0b6b3a;
  --p2: #09552f;
  --bg: #f4f7f5;
  --card: #ffffff;
  --text: #1f2933;
  --muted: #6b7280;
  --border: #dfe7e2;
  --danger: #dc2626;
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
}

header {
  background: linear-gradient(
    135deg,
    var(--p),
    var(--p2)
  );
  color: white;
  padding: 18px 15px;
  text-align: center;
  font-size: 20px;
  font-weight: 800;
}

main {
  padding: 12px;
  padding-bottom: 90px;
}

.page {
  display: none;
}

.page.active {
  display: block;
}

h2 {
  margin:
    8px
    0
    15px;
}

.card {
  background: white;
  border-radius: 16px;
  padding: 15px;
  margin-bottom: 14px;
  border:
    1px solid
    var(--border);
}

label {
  display: block;
  margin-top: 12px;
  margin-bottom: 6px;
  font-size: 13px;
  font-weight: 700;
}

input,
select {
  width: 100%;
  border:
    1px solid
    #d7dfda;
  border-radius: 11px;
  padding: 13px 12px;
  font-size: 16px;
  outline: none;
  background: white;
}

input:focus {
  border-color: var(--p);
}

input[readonly] {
  background: #f7f9f8;
}

.row {
  display: grid;
  grid-template-columns:
    1fr 1fr;
  gap: 10px;
}

.search {
  display: flex;
  gap: 8px;
}

.search input {
  flex: 1;
  min-width: 0;
}

.btn {
  border: 0;
  border-radius: 11px;
  padding: 12px 14px;
  font-size: 14px;
  font-weight: 800;
  cursor: pointer;
}

.btn.primary {
  background: var(--p);
  color: white;
}

.btn.secondary {
  background: #e9f4ee;
  color: var(--p);
}

.total {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-weight: 900;
}

.item {
  border-bottom:
    1px solid
    #edf0ee;
  padding:
    12px
    0;
}

.item:last-child {
  border-bottom: 0;
}

.item-top {
  display: flex;
  justify-content: space-between;
  gap: 10px;
  font-weight: 700;
}

.qty {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-top: 10px;
}

.qty button {
  width: 34px;
  height: 34px;
  border: 0;
  border-radius: 9px;
  font-size: 20px;
  background: #e9f4ee;
  color: var(--p);
}

.empty {
  text-align: center;
  color: var(--muted);
  padding: 20px;
}


/* =========================================
   PAGE VENTE PROFESSIONNELLE
========================================= */

#vente h2 {
  font-size: 22px;
  margin-bottom: 14px;
}

#vente .sale-card {
  border:
    1px solid
    #e7ece9;

  box-shadow:
    0 8px 28px
    rgba(
      18,
      59,
      40,
      0.07
    );
}

#vente .sale-title {
  font-size: 13px;
  font-weight: 800;
  color: var(--p);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 12px;
}

#vente .scanner-btn {
  min-width: 104px;
  padding:
    10px
    12px;
  font-size: 13px;
}

#vente .sale-product-row {
  display: grid;
  grid-template-columns:
    repeat(
      3,
      minmax(0, 1fr)
    );
  gap: 7px;
}

#vente .sale-product-row input {
  text-align: center;
  padding-left: 4px;
  padding-right: 4px;
  font-weight: 700;
}

#vente .add-sale-btn {
  width: 100%;
  margin-top: 14px;
  padding: 15px;
  font-size: 15px;
}

#vente .sale-total {
  margin-top: 14px;
  background: #eef7f2;
  border: 0;
  border-radius: 14px;
  padding: 15px 16px;
  color: var(--p);
  font-size: 22px;
}

#vente .payment-grid {
  display: grid;
  grid-template-columns:
    1fr 1fr;
  gap: 8px;
  margin-top: 10px;
}

#vente .payment-box {
  background: #f8faf9;
  border:
    1px solid
    #e3e9e5;
  border-radius: 14px;
  padding: 9px;
}

#vente .payment-box label {
  margin-top: 0;
  font-weight: 700;
}

#vente .payment-box input {
  text-align: center;
  font-size: 18px;
  font-weight: 800;
}

#vente #changeAmount {
  background: #eef7f2;
  color: var(--p);
}

#vente .checkout-btn {
  width: 100%;
  margin-top: 10px;
  padding: 16px;
  font-size: 16px;
}

@media (
  max-width: 390px
) {

  #vente .sale-product-row {
    gap: 4px;
  }

  #vente .sale-product-row input {
    font-size: 13px;
    padding:
      12px
      2px;
  }

  #vente .payment-grid {
    gap: 5px;
  }

  #vente .payment-box {
    padding: 7px;
  }

}


/* =========================================
   NAVIGATION
========================================= */

.bottom-nav {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;

  display: flex;

  background: white;

  border-top:
    1px solid
    #dfe7e2;

  z-index: 100;
}

.bottom-nav button {
  flex: 1;

  border: 0;

  background: white;

  padding:
    12px
    5px;

  font-size: 11px;

  color: #6b7280;
}

.bottom-nav button.active {
  color: var(--p);
  font-weight: 800;
}


/* =========================================
   SCANNER
========================================= */

#scannerOverlay {
  position: fixed;
  inset: 0;

  display: none;

  background: black;

  z-index: 9999;
}

#scannerFrame {
  width: 100%;
  height: 100%;
}

#closeScanner {
  position: absolute;

  top: 20px;
  right: 20px;

  width: 45px;
  height: 45px;

  border: 0;
  border-radius: 50%;

  background:
    rgba(
      255,
      255,
      255,
      0.9
    );

  font-size: 28px;

  z-index: 10000;
}

</style>

</head>

<body>

<header>
  APPLICATION VENTE
</header>

<main>


<!-- =====================================
     PAGE VENTE
===================================== -->

<section
  id="vente"
  class="page active"
>

  <h2>
    Nouvelle vente
  </h2>


  <!-- AJOUTER PRODUIT -->

  <div class="card sale-card">

    <div class="sale-title">
      Ajouter un produit
    </div>


    <label>
      Barcode
    </label>


    <div class="search">

      <input
        id="saleBarcode"
        inputmode="numeric"
        placeholder="Scanner / saisir le barcode"
        oninput="lookupSaleProduct()"
      >


      <button
        class="btn secondary scanner-btn"
        onclick="
          openScanner(
            'saleBarcode',
            'lookupSale'
          )
        "
      >
        SCANNER
      </button>

    </div>


    <label>
      Nom produit
    </label>


    <input
      id="saleProductName"
      readonly
      placeholder="Nom du produit"
    >


    <!-- PRIX + STOCK + QUANTITE -->

    <div class="sale-product-row">


      <div>

        <label>
          Prix de vente
        </label>

        <input
          id="salePrice"
          readonly
          placeholder="0.00 DH"
        >

      </div>


      <div>

        <label>
          Stock
        </label>

        <input
          id="saleStock"
          readonly
          placeholder="0"
        >

      </div>


      <div>

        <label>
          Quantité
        </label>

        <input
          id="saleQty"
          type="number"
          min="1"
          inputmode="numeric"
          value="1"

          onfocus="
            if(
              this.value === '1'
            ){
              this.value = '';
            }
          "

          onblur="
            if(
              this.value === ''
            ){
              this.value = '1';
            }
          "
        >

      </div>


    </div>


    <button
      class="btn primary add-sale-btn"
      onclick="addSale()"
    >
      AJOUTER AU PANIER
    </button>


    <!-- TOTAL -->

    <div class="total sale-total">

      <span>
        TOTAL
      </span>

      <span id="cartTotal">
        0.00 DH
      </span>

    </div>


    <!-- PAIEMENT -->

    <div class="payment-grid">


      <div class="payment-box">

        <label>
          Montant reçu
        </label>

        <input
          id="amountReceived"
          type="number"
          min="0"
          step="0.01"
          inputmode="decimal"
          placeholder="0.00"
          oninput="updateChange()"
        >

      </div>


      <div class="payment-box">

        <label>
          Monnaie à rendre
        </label>

        <input
          id="changeAmount"
          type="text"
          value="0.00 DH"
          readonly
          tabindex="-1"
        >

      </div>


    </div>


    <button
      class="btn primary checkout-btn"
      onclick="checkout()"
    >
      VALIDER LA VENTE
    </button>


    <div style="display:none">

      <input
        id="nombreClient"
        type="number"
        value="1"
      >

    </div>


  </div>


  <!-- PANIER -->

  <div class="card sale-card">

    <div class="sale-title">
      Panier
    </div>

    <div id="cart"></div>

  </div>


</section>
<!-- =====================================
     PAGE PRODUITS
===================================== -->

<section
  id="produits"
  class="page"
>

  <h2>
    Produits
  </h2>

  <div class="card">

    <label>
      Rechercher un produit
    </label>

    <input
      id="searchProduit"
      type="text"
      placeholder="Barcode ou nom du produit"
      oninput="renderProducts()"
    >

  </div>

  <div
    id="productsList"
    class="card"
  >
    <div class="empty">
      Chargement des produits...
    </div>
  </div>

</section>


<!-- =====================================
     PAGE STOCK
===================================== -->

<section
  id="stock"
  class="page"
>

  <h2>
    Stock
  </h2>

  <div class="card">

    <div class="total">

      <span>
        Nombre produits
      </span>

      <span id="stockProductCount">
        0
      </span>

    </div>

    <div
      class="total"
      style="margin-top:15px"
    >

      <span>
        Quantité totale
      </span>

      <span id="stockTotalQty">
        0
      </span>

    </div>

    <div
      class="total"
      style="margin-top:15px"
    >

      <span>
        Valeur du stock
      </span>

      <span id="stockTotalValue">
        0.00 DH
      </span>

    </div>

  </div>


  <div class="card">

    <label>
      Rechercher
    </label>

    <input
      id="stockSearch"
      type="text"
      placeholder="Barcode ou nom"
      oninput="renderStock()"
    >

  </div>


  <div
    id="stockList"
    class="card"
  >

    <div class="empty">
      Chargement...
    </div>

  </div>

</section>


<!-- =====================================
     PAGE RECEPTION
===================================== -->

<section
  id="reception"
  class="page"
>

  <h2>
    Réception
  </h2>


  <div class="card">

    <label>
      Barcode
    </label>


    <div class="search">

      <input
        id="receptionBarcode"
        inputmode="numeric"
        placeholder="Scanner / saisir le barcode"
        oninput="lookupReceptionProduct()"
      >


      <button
        class="btn secondary"
        onclick="
          openScanner(
            'receptionBarcode',
            'lookupReception'
          )
        "
      >
        SCANNER
      </button>

    </div>


    <label>
      Nom produit
    </label>

    <input
      id="receptionProductName"
      readonly
      placeholder="Nom du produit"
    >


    <div class="row">


      <div>

        <label>
          Prix achat
        </label>

        <input
          id="receptionPrice"
          type="number"
          step="0.01"
          inputmode="decimal"
          placeholder="0.00"
        >

      </div>


      <div>

        <label>
          Quantité
        </label>

        <input
          id="receptionQty"
          type="number"
          min="1"
          inputmode="numeric"
          value="1"
        >

      </div>


    </div>


    <button
      class="btn primary"
      style="
        width:100%;
        margin-top:14px
      "
      onclick="addReception()"
    >
      AJOUTER
    </button>

  </div>


  <div class="card">

    <div id="receptionCart">

      <div class="empty">
        Aucun produit
      </div>

    </div>


    <button
      class="btn primary"
      style="
        width:100%;
        margin-top:15px
      "
      onclick="validateReception()"
    >
      VALIDER LA RÉCEPTION
    </button>

  </div>


</section>


<!-- =====================================
     PAGE HISTORIQUE
===================================== -->

<section
  id="historique"
  class="page"
>

  <h2>
    Historique
  </h2>


  <div class="card">

    <button
      class="btn secondary"
      style="width:100%"
      onclick="loadVentes()"
    >
      ACTUALISER
    </button>

  </div>


  <div
    id="ventesList"
    class="card"
  >

    <div class="empty">
      Aucun historique chargé
    </div>

  </div>

</section>


</main>


<!-- =====================================
     NAVIGATION
===================================== -->

<nav class="bottom-nav">


  <button
    class="active"
    onclick="
      showPage(
        'vente',
        this
      )
    "
  >
    VENTE
  </button>


  <button
    onclick="
      showPage(
        'produits',
        this
      )
    "
  >
    PRODUITS
  </button>


  <button
    onclick="
      showPage(
        'stock',
        this
      )
    "
  >
    STOCK
  </button>


  <button
    onclick="
      showPage(
        'reception',
        this
      )
    "
  >
    RÉCEPTION
  </button>


  <button
    onclick="
      showPage(
        'historique',
        this
      )
    "
  >
    HISTORIQUE
  </button>


</nav>


<!-- =====================================
     SCANNER
===================================== -->

<div id="scannerOverlay">


  <button
    id="closeScanner"
    onclick="stopScanner()"
  >
    ×
  </button>


  <div id="scannerFrame"></div>


</div>

<script>

/* =========================================
   CONFIGURATION API

   مهم:
   ضع هنا رابط Google Apps Script الحالي
========================================= */

const API_URL =
  "https://script.google.com/macros/s/AKfycbza60jqlxobGC9b-9qxNAwNsC2NcYRBauQB6Qn1zhdu7RS47jg__5O7Pcx-LW80qPPBWA/exec";


/* =========================================
   VARIABLES
========================================= */

let products = [];

let cart = [];

let receptionCart = [];

let lastFoundSaleBarcode = "";

let lastFoundReceptionBarcode = "";

let html5QrCode = null;

let scannerTarget = "";

let scannerMode = "";


/* =========================================
   ÉLÉMENTS VENTE
========================================= */

const saleBarcode =
  document.getElementById(
    "saleBarcode"
  );

const saleProductName =
  document.getElementById(
    "saleProductName"
  );

const salePrice =
  document.getElementById(
    "salePrice"
  );

const saleStock =
  document.getElementById(
    "saleStock"
  );

const saleQty =
  document.getElementById(
    "saleQty"
  );

const cartTotal =
  document.getElementById(
    "cartTotal"
  );

const nombreClient =
  document.getElementById(
    "nombreClient"
  );


/* =========================================
   NAVIGATION
========================================= */

function showPage(
  pageId,
  button
) {

  document
    .querySelectorAll(
      ".page"
    )
    .forEach(
      page => {

        page
          .classList
          .remove(
            "active"
          );

      }
    );


  const page =
    document
      .getElementById(
        pageId
      );


  if (page) {

    page
      .classList
      .add(
        "active"
      );

  }


  document
    .querySelectorAll(
      ".bottom-nav button"
    )
    .forEach(
      btn => {

        btn
          .classList
          .remove(
            "active"
          );

      }
    );


  if (button) {

    button
      .classList
      .add(
        "active"
      );

  }


  /*
    عند الدخول إلى STOCK
    يتم تحديث العرض.
  */

  if (
    pageId ===
    "stock"
  ) {

    renderStock();

  }


  if (
    pageId ===
    "produits"
  ) {

    renderProducts();

  }

}


/* =========================================
   API GET
========================================= */

async function apiGet(
  action,
  params = {}
) {


  const query =

    new URLSearchParams({

      action:
        action,

      ...params

    });


  const response =

    await fetch(

      API_URL +

      "?" +

      query.toString(),

      {

        method:
          "GET",

        cache:
          "no-store"

      }

    );


  if (
    !response.ok
  ) {

    throw new Error(
      "Erreur réseau"
    );

  }


  return await
    response.json();

}


/* =========================================
   API POST
========================================= */

async function apiPost(
  data
) {


  const response =

    await fetch(

      API_URL,

      {

        method:
          "POST",

        headers: {

          "Content-Type":
            "text/plain;charset=utf-8"

        },

        body:
          JSON.stringify(
            data
          )

      }

    );


  if (
    !response.ok
  ) {

    throw new Error(
      "Erreur réseau"
    );

  }


  return await
    response.json();

}


/* =========================================
   CHARGER PRODUITS
========================================= */

async function loadProducts() {


  try {


    const result =

      await apiGet(
        "getProduits"
      );


    if (
      !result.success
    ) {

      throw new Error(
        result.message
      );

    }


    products =

      result.produits ||
      [];


    renderProducts();

    renderStock();


  }

  catch (
    error
  ) {


    console.error(
      error
    );


    toast(
      "Erreur chargement produits"
    );


  }

}


/* =========================================
   RECHERCHE PRODUIT VENTE
========================================= */

function lookupSaleProduct() {


  const barcode =

    String(
      saleBarcode.value
    )
      .trim();


  if (
    !barcode
  ) {


    saleProductName.value =
      "";

    salePrice.value =
      "";

    saleStock.value =
      "";

    lastFoundSaleBarcode =
      "";


    return;

  }


  const produit =

    products.find(

      item =>

        String(
          item.barcode
        )
          .trim()

        ===

        barcode

    );


  if (
    !produit
  ) {


    saleProductName.value =
      "";

    salePrice.value =
      "";

    saleStock.value =
      "";

    lastFoundSaleBarcode =
      "";


    return;

  }


  saleProductName.value =

    produit.nom_produit;


  salePrice.value =

    Number(
      produit.prix_vente
    )
      .toFixed(2) +

    " DH";


  saleStock.value =

    Number(
      produit.stock
    ) || 0;


  lastFoundSaleBarcode =

    barcode;

}
/* =========================================
   AJOUTER PRODUIT AU PANIER
========================================= */

function addSale() {

  const barcode =
    String(
      saleBarcode.value
    ).trim();

  const quantite =
    Number(
      saleQty.value
    ) || 1;


  if (!barcode) {

    alert(
      "Veuillez saisir ou scanner un barcode"
    );

    return;

  }


  const produit =
    products.find(
      item =>
        String(
          item.barcode
        ).trim() === barcode
    );


  if (!produit) {

    alert(
      "Produit introuvable"
    );

    return;

  }


  if (
    quantite <= 0
  ) {

    alert(
      "Quantité invalide"
    );

    return;

  }


  const produitPanier =
    cart.find(
      item =>
        String(
          item.barcode
        ) === barcode
    );


  const quantiteActuelle =
    produitPanier
      ? Number(
          produitPanier.quantite
        )
      : 0;


  if (
    quantiteActuelle +
    quantite >
    Number(
      produit.stock
    )
  ) {

    alert(
      "Stock insuffisant"
    );

    return;

  }


  if (produitPanier) {

    produitPanier.quantite +=
      quantite;

  }

  else {

    cart.push({

      barcode:
        String(
          produit.barcode
        ),

      nom_produit:
        produit.nom_produit,

      prix_vente:
        Number(
          produit.prix_vente
        ),

      quantite:
        quantite

    });

  }


  /* Nettoyer les champs */

  saleBarcode.value =
    "";

  saleProductName.value =
    "";

  salePrice.value =
    "";

  saleStock.value =
    "";

  saleQty.value =
    "1";

  lastFoundSaleBarcode =
    "";


  renderCart();


  /*
    Remettre le curseur
    sur le barcode.
  */

  saleBarcode.focus();

}


/* =========================================
   MODIFIER QUANTITÉ PANIER
========================================= */

function changeQty(
  barcode,
  change
) {


  const item =
    cart.find(
      produit =>
        String(
          produit.barcode
        ) ===
        String(
          barcode
        )
    );


  if (!item) {

    return;

  }


  const produitStock =
    products.find(
      produit =>
        String(
          produit.barcode
        ) ===
        String(
          barcode
        )
    );


  const nouvelleQuantite =

    Number(
      item.quantite
    ) +

    Number(
      change
    );


  /*
    Si quantité = 0,
    supprimer du panier.
  */

  if (
    nouvelleQuantite <= 0
  ) {

    cart =
      cart.filter(
        produit =>
          String(
            produit.barcode
          ) !==
          String(
            barcode
          )
      );


    renderCart();

    return;

  }


  /*
    Vérifier le stock.
  */

  if (

    produitStock &&

    nouvelleQuantite >

    Number(
      produitStock.stock
    )

  ) {

    alert(
      "Stock insuffisant"
    );

    return;

  }


  item.quantite =
    nouvelleQuantite;


  renderCart();

}


/* =========================================
   CALCUL TOTAL
========================================= */

function getCartTotal() {


  return cart.reduce(

    (
      total,
      item
    ) => {


      return (

        total +

        Number(
          item.prix_vente
        ) *

        Number(
          item.quantite
        )

      );

    },

    0

  );

}


/* =========================================
   CALCUL MONNAIE À RENDRE
========================================= */

function updateChange() {


  const total =
    getCartTotal();


  const montantRecuField =

    document
      .getElementById(
        "amountReceived"
      );


  const monnaieField =

    document
      .getElementById(
        "changeAmount"
      );


  const montantRecu =

    Number(
      montantRecuField
        ?.value
    ) || 0;


  const monnaie =

    Math.max(

      0,

      montantRecu -
      total

    );


  if (
    monnaieField
  ) {


    monnaieField.value =

      monnaie
        .toFixed(2) +

      " DH";

  }

}


/* =========================================
   AFFICHER PANIER
========================================= */

function renderCart() {


  const cartElement =

    document
      .getElementById(
        "cart"
      );


  if (
    !cartElement
  ) {

    return;

  }


  if (
    cart.length === 0
  ) {


    cartElement.innerHTML =

      '<div class="empty">' +

      'Panier vide' +

      '</div>';


  }

  else {


    cartElement.innerHTML =

      cart

        .map(

          item => {


            const totalProduit =

              Number(
                item.prix_vente
              ) *

              Number(
                item.quantite
              );


            return `

              <div class="item">

                <div class="item-top">

                  <span>

                    ${esc(
                      item.nom_produit
                    )}

                  </span>


                  <span>

                    ${totalProduit
                      .toFixed(2)}

                    DH

                  </span>

                </div>


                <div class="qty">

                  <button
                    onclick="
                      changeQty(
                        '${item.barcode}',
                        -1
                      )
                    "
                  >
                    −
                  </button>


                  <span>

                    ${item.quantite}

                  </span>


                  <button
                    onclick="
                      changeQty(
                        '${item.barcode}',
                        1
                      )
                    "
                  >
                    +
                  </button>

                </div>

              </div>

            `;

          }

        )

        .join("");

  }


  cartTotal.textContent =

    getCartTotal()
      .toFixed(2) +

    " DH";


  updateChange();

}


/* =========================================
   VALIDER LA VENTE
   ENREGISTREMENT RAPIDE EN ARRIÈRE-PLAN
========================================= */

async function checkout() {


  if (
    cart.length === 0
  ) {

    alert(
      "Le panier est vide"
    );

    return;

  }


  /*
    On copie la vente avant
    de vider le panier.
  */

  const venteAEnvoyer =

    cart.map(

      item => ({

        barcode:
          item.barcode,

        quantite:
          Number(
            item.quantite
          )

      })

    );


  const numeroClient =

    Number(
      nombreClient.value
    ) || 1;


  /*
    Mettre à jour le stock
    local immédiatement.
  */

  venteAEnvoyer.forEach(

    vente => {


      const produit =

        products.find(

          item =>

            String(
              item.barcode
            ) ===

            String(
              vente.barcode
            )

        );


      if (
        produit
      ) {


        produit.stock =

          Number(
            produit.stock
          ) -

          Number(
            vente.quantite
          );


      }


    }

  );


  /*
    Vider immédiatement
    le panier.
  */

  cart = [];


  renderCart();


  /*
    Réinitialiser les champs.
  */

  saleBarcode.value =
    "";

  saleProductName.value =
    "";

  salePrice.value =
    "";

  saleStock.value =
    "";

  saleQty.value =
    "1";


  const montantRecuField =

    document
      .getElementById(
        "amountReceived"
      );


  if (
    montantRecuField
  ) {

    montantRecuField.value =
      "";

  }


  updateChange();


  /*
    Mettre à jour les pages
    avec le nouveau stock local.
  */

  renderProducts();

  renderStock();


  /*
    L'utilisateur peut commencer
    immédiatement la vente suivante.
  */

  saleBarcode.focus();


  toast(
    "Vente en cours d'enregistrement..."
  );


  /*
    Envoi en arrière-plan.
  */

  try {


    const result =

      await apiPost({

        action:
          "vente",

        produits:
          venteAEnvoyer,

        nombre_client:
          numeroClient

      });


    if (
      result.success
    ) {


      toast(

        "Vente enregistrée - Facture N° " +

        result.facture

      );


    }

    else {


      throw new Error(
        result.message ||
        "Erreur vente"
      );


    }


  }

  catch (
    error
  ) {


    console.error(
      error
    );


    /*
      En cas d'erreur serveur,
      on recharge le stock réel.
    */

    toast(
      "Erreur d'enregistrement de la vente"
    );


    await loadProducts();


  }

}


/* =========================================
   AFFICHER PRODUITS
========================================= */

function renderProducts() {


  const container =

    document
      .getElementById(
        "productsList"
      );


  if (
    !container
  ) {

    return;

  }


  const searchField =

    document
      .getElementById(
        "searchProduit"
      );


  const search =

    String(
      searchField
        ?.value || ""
    )
      .toLowerCase()
      .trim();


  const filtered =

    products.filter(

      produit => {


        const barcode =

          String(
            produit.barcode
          )
            .toLowerCase();


        const nom =

          String(
            produit.nom_produit
          )
            .toLowerCase();


        return (

          barcode.includes(
            search
          )

          ||

          nom.includes(
            search
          )

        );

      }

    );


  if (
    filtered.length === 0
  ) {


    container.innerHTML =

      '<div class="empty">' +

      'Aucun produit' +

      '</div>';


    return;

  }


  container.innerHTML =

    filtered

      .map(

        produit => `

          <div class="item">

            <div class="item-top">

              <span>

                ${esc(
                  produit.nom_produit
                )}

              </span>

              <span>

                ${Number(
                  produit.prix_vente
                ).toFixed(2)}

                DH

              </span>

            </div>


            <div
              style="
                margin-top:7px;
                color:#6b7280;
                font-size:13px
              "
            >

              ${esc(
                String(
                  produit.barcode
                )
              )}

              ·

              Stock:

              ${Number(
                produit.stock
              )}

            </div>

          </div>

        `

      )

      .join("");

}


/* =========================================
   AFFICHER STOCK
========================================= */

function renderStock() {


  const container =

    document
      .getElementById(
        "stockList"
      );


  if (
    !container
  ) {

    return;

  }


  const searchField =

    document
      .getElementById(
        "stockSearch"
      );


  const search =

    String(
      searchField
        ?.value || ""
    )
      .toLowerCase()
      .trim();


  let quantiteTotale =
    0;


  let valeurTotale =
    0;


  products.forEach(

    produit => {


      quantiteTotale +=

        Number(
          produit.stock
        ) || 0;


      valeurTotale +=

        Number(
          produit.valeur_stock
        ) || 0;


    }

  );


  const countElement =

    document
      .getElementById(
        "stockProductCount"
      );


  const qtyElement =

    document
      .getElementById(
        "stockTotalQty"
      );


  const valueElement =

    document
      .getElementById(
        "stockTotalValue"
      );


  if (
    countElement
  ) {

    countElement.textContent =

      products.length;

  }


  if (
    qtyElement
  ) {

    qtyElement.textContent =

      quantiteTotale;

  }


  if (
    valueElement
  ) {

    valueElement.textContent =

      valeurTotale
        .toFixed(2) +

      " DH";

  }


  const filtered =

    products.filter(

      produit => {


        return (

          String(
            produit.barcode
          )
            .toLowerCase()
            .includes(
              search
            )

          ||

          String(
            produit.nom_produit
          )
            .toLowerCase()
            .includes(
              search
            )

        );

      }

    );


  container.innerHTML =

    filtered.length

      ?

      filtered

        .map(

          produit => `

            <div class="item">

              <div class="item-top">

                <span>

                  ${esc(
                    produit.nom_produit
                  )}

                </span>

                <strong>

                  ${Number(
                    produit.stock
                  )}

                </strong>

              </div>


              <div
                style="
                  margin-top:7px;
                  color:#6b7280;
                  font-size:13px
                "
              >

                ${esc(
                  String(
                    produit.barcode
                  )
                )}

              </div>

            </div>

          `

        )

        .join("")

      :

      '<div class="empty">' +

      'Aucun produit' +

      '</div>';

}


/* =========================================
   RECHERCHE PRODUIT RÉCEPTION
========================================= */

function lookupReceptionProduct() {


  const barcodeField =

    document
      .getElementById(
        "receptionBarcode"
      );


  const nameField =

    document
      .getElementById(
        "receptionProductName"
      );


  const priceField =

    document
      .getElementById(
        "receptionPrice"
      );


  const barcode =

    String(
      barcodeField.value
    )
      .trim();


  if (
    !barcode
  ) {


    nameField.value =
      "";

    priceField.value =
      "";

    lastFoundReceptionBarcode =
      "";


    return;

  }


  const produit =

    products.find(

      item =>

        String(
          item.barcode
        )
          .trim()

        ===

        barcode

    );


  if (
    !produit
  ) {

    return;

  }


  nameField.value =

    produit.nom_produit;


  priceField.value =

    Number(
      produit.prix_achat
    );


  lastFoundReceptionBarcode =

    barcode;

}


/* =========================================
   AJOUTER RÉCEPTION
========================================= */

function addReception() {


  const barcode =

    String(

      document
        .getElementById(
          "receptionBarcode"
        )
        .value

    )
      .trim();


  const quantite =

    Number(

      document
        .getElementById(
          "receptionQty"
        )
        .value

    );


  const prixAchat =

    Number(

      document
        .getElementById(
          "receptionPrice"
        )
        .value

    );


  const produit =

    products.find(

      item =>

        String(
          item.barcode
        )
          .trim()

        ===

        barcode

    );


  if (
    !produit
  ) {

    alert(
      "Produit introuvable"
    );

    return;

  }


  if (
    !quantite ||
    quantite <= 0
  ) {

    alert(
      "Quantité invalide"
    );

    return;

  }


  receptionCart.push({

    barcode:
      produit.barcode,

    nom_produit:
      produit.nom_produit,

    prix_achat:
      prixAchat,

    quantite:
      quantite

  });


  document
    .getElementById(
      "receptionBarcode"
    )
    .value = "";


  document
    .getElementById(
      "receptionProductName"
    )
    .value = "";


  document
    .getElementById(
      "receptionPrice"
    )
    .value = "";


  document
    .getElementById(
      "receptionQty"
    )
    .value = "1";


  renderReceptionCart();

}


/* =========================================
   AFFICHER PANIER RÉCEPTION
========================================= */

function renderReceptionCart() {


  const container =

    document
      .getElementById(
        "receptionCart"
      );


  if (
    receptionCart.length === 0
  ) {


    container.innerHTML =

      '<div class="empty">' +

      'Aucun produit' +

      '</div>';


    return;

  }


  container.innerHTML =

    receptionCart

      .map(

        item => `

          <div class="item">

            <div class="item-top">

              <span>

                ${esc(
                  item.nom_produit
                )}

              </span>

              <span>

                x${item.quantite}

              </span>

            </div>

          </div>

        `

      )

      .join("");

}


/* =========================================
   VALIDER RÉCEPTION
========================================= */

async function validateReception() {


  if (
    receptionCart.length === 0
  ) {

    alert(
      "Aucun produit"
    );

    return;

  }


  try {


    const result =

      await apiPost({

        action:
          "reception",

        produits:

          receptionCart.map(

            item => ({

              barcode:
                item.barcode,

              quantite:
                item.quantite,

              prix_achat:
                item.prix_achat

            })

          )

      });


    if (
      !result.success
    ) {

      throw new Error(
        result.message
      );

    }


    receptionCart =
      [];


    renderReceptionCart();


    await loadProducts();


    toast(
      "Réception enregistrée"
    );


  }

  catch (
    error
  ) {


    alert(
      error.message
    );


  }

}


/* =========================================
   HISTORIQUE VENTES
========================================= */

async function loadVentes() {


  const container =

    document
      .getElementById(
        "ventesList"
      );


  container.innerHTML =

    '<div class="empty">' +

    'Chargement...' +

    '</div>';


  try {


    const result =

      await apiGet(
        "getVentes"
      );


    const ventes =

      result.ventes ||
      [];


    if (
      ventes.length === 0
    ) {


      container.innerHTML =

        '<div class="empty">' +

        'Aucune vente' +

        '</div>';


      return;

    }


    /*
      Grouper les produits
      par numéro de facture.
    */

    const factures =
      {};


    ventes.forEach(

      ligne => {


        const numero =

          String(
            ligne[0]
          );


        if (
          !factures[numero]
        ) {


          factures[numero] = {

            numero:
              numero,

            date:
              ligne[1],

            produits:
              [],

            total:
              0

          };


        }


        factures[numero]
          .produits
          .push({

            barcode:
              ligne[2],

            nom:
              ligne[3],

            prix:
              Number(
                ligne[5]
              ),

            quantite:
              Number(
                ligne[6]
              )

          });


        factures[numero]
          .total +=

          Number(
            ligne[8]
          ) || 0;


      }

    );


    const listeFactures =

      Object
        .values(
          factures
        )
        .reverse();


    container.innerHTML =

      listeFactures

        .map(

          facture => `

            <details
              style="
                margin-bottom:12px;
                border:1px solid #e5e7eb;
                border-radius:12px;
                padding:12px
              "
            >

              <summary
                style="
                  cursor:pointer;
                  font-weight:800;
                  color:#dc2626
                "
              >

                FACTURE N°

                ${esc(
                  facture.numero
                )}

                <span
                  style="
                    float:right;
                    color:#0b6b3a
                  "
                >

                  TOTAL

                  ${facture.total
                    .toFixed(2)}

                  DH

                </span>

              </summary>


              <div
                style="
                  margin-top:12px
                "
              >

                ${facture.produits

                  .map(

                    produit => `

                      <div
                        style="
                          padding:8px 0;
                          border-bottom:1px solid #eee
                        "
                      >

                        ${esc(
                          String(
                            produit.barcode
                          )
                        )}

                        :

                        ${esc(
                          produit.nom
                        )}

                        x${produit.quantite}

                        <strong
                          style="
                            float:right;
                            color:#2563eb
                          "
                        >

                          ${(produit.prix *
                          produit.quantite)
                            .toFixed(2)}

                          DH

                        </strong>

                      </div>

                    `

                  )

                  .join("")}

              </div>

            </details>

          `

        )

        .join("");


  }

  catch (
    error
  ) {


    container.innerHTML =

      '<div class="empty">' +

      'Erreur de chargement' +

      '</div>';


  }

}


/* =========================================
   SCANNER
========================================= */

async function openScanner(
  target,
  mode
) {


  scannerTarget =
    target;


  scannerMode =
    mode;


  const overlay =

    document
      .getElementById(
        "scannerOverlay"
      );


  overlay.style.display =
    "block";


  try {


    html5QrCode =

      new Html5Qrcode(
        "scannerFrame"
      );


    const config = {

      fps:
        20,

      qrbox: {

        width:
          280,

        height:
          130

      },

      aspectRatio:
        1.5,

      formatsToSupport: [

        Html5QrcodeSupportedFormats
          .EAN_13,

        Html5QrcodeSupportedFormats
          .EAN_8,

        Html5QrcodeSupportedFormats
          .UPC_A,

        Html5QrcodeSupportedFormats
          .UPC_E,

        Html5QrcodeSupportedFormats
          .CODE_128

      ]

    };


    await html5QrCode.start(

      {

        facingMode:
          "environment"

      },

      config,

      async decodedText => {


        const field =

          document
            .getElementById(
              scannerTarget
            );


        if (
          field
        ) {

          field.value =
            decodedText;

        }


        await stopScanner();


        if (
          scannerMode ===
          "lookupSale"
        ) {

          lookupSaleProduct();

        }


        if (
          scannerMode ===
          "lookupReception"
        ) {

          lookupReceptionProduct();

        }


      },

      () => {}

    );


  }

  catch (
    error
  ) {


    console.error(
      error
    );


    overlay.style.display =
      "none";


    alert(
      "Impossible d'ouvrir la caméra"
    );


  }

}


/* =========================================
   ARRÊTER SCANNER
========================================= */

async function stopScanner() {


  const overlay =

    document
      .getElementById(
        "scannerOverlay"
      );


  if (
    html5QrCode
  ) {


    try {


      if (
        html5QrCode
          .isScanning
      ) {


        await html5QrCode
          .stop();


      }


      await html5QrCode
        .clear();


    }

    catch (
      error
    ) {


      console.error(
        error
      );


    }


    html5QrCode =
      null;

  }


  overlay.style.display =
    "none";

}


/* =========================================
   FERMER CAMÉRA EN ARRIÈRE-PLAN
========================================= */

document.addEventListener(

  "visibilitychange",

  () => {


    if (
      document.hidden
    ) {

      stopScanner();

    }


  }

);


window.addEventListener(

  "blur",

  () => {


    if (
      html5QrCode
    ) {

      stopScanner();

    }


  }

);


/* =========================================
   SÉCURITÉ HTML
========================================= */

function esc(
  value
) {


  return String(
    value ?? ""
  )

    .replaceAll(
      "&",
      "&amp;"
    )

    .replaceAll(
      "<",
      "&lt;"
    )

    .replaceAll(
      ">",
      "&gt;"
    )

    .replaceAll(
      '"',
      "&quot;"
    )

    .replaceAll(
      "'",
      "&#039;"
    );

}


/* =========================================
   MESSAGE RAPIDE
========================================= */

function toast(
  message
) {


  let element =

    document
      .getElementById(
        "appToast"
      );


  if (
    !element
  ) {


    element =

      document
        .createElement(
          "div"
        );


    element.id =
      "appToast";


    element.style.cssText = `

      position:fixed;

      left:50%;

      bottom:90px;

      transform:translateX(-50%);

      background:#1f2933;

      color:white;

      padding:12px 18px;

      border-radius:12px;

      z-index:20000;

      font-size:14px;

      font-weight:700;

      box-shadow:
        0 8px 30px
        rgba(0,0,0,.25);

      max-width:90%;

      text-align:center;

    `;


    document
      .body
      .appendChild(
        element
      );

  }


  element.textContent =
    message;


  element.style.display =
    "block";


  clearTimeout(
    window.appToastTimer
  );


  window.appToastTimer =

    setTimeout(

      () => {


        element.style.display =
          "none";


      },

      2500

    );

}


/* =========================================
   DÉMARRAGE APPLICATION
========================================= */

document.addEventListener(

  async () => {


    renderCart();

    renderReceptionCart();


    await loadProducts();


    /*
      Focus automatique
      sur le barcode vente.
    */

    setTimeout(

      () => {


        saleBarcode.focus();


      },

      300

    );


  }

);
